        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000; /* 默认背景纯黑，避免移动端白边 */
        }

        body { 
            overflow: hidden; 
            /* 深邃蓝黑色渐变，覆盖在黑色基础上 */
            background: radial-gradient(circle at 0% 100%, #0066ff 0%, #040a18 50%, #000000 100%);
            font-family: sans-serif;
            position: relative;
            --noise-opacity: 0.08; /* 控制颗粒强度的变量 */
        }
        
        /* 胶片颗粒噪点层 (覆盖在整个画面上方) */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: var(--noise-opacity);
            z-index: 10;
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 1;
        }
        
        /* 新增：强制控制面板处于绝对的最上层，防止被画布或噪点遮挡 */
        .dg.ac {
            z-index: 9999 !important;

        /* 底部极简社交按钮 */
        #socialBar {

        }

        .social-btn {
            width: 30px;

            border-radius: 999px;
            border: 1px solid transparent;
            background:
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)) padding-box,
                linear-gradient(160deg,
                    rgba(255, 255, 255, 0.45) 0%,
                    rgba(200, 205, 215, 0.2) 30%,
                    rgba(100, 105, 115, 0.25) 50%,
                    rgba(170, 175, 185, 0.3) 70%,
                    rgba(255, 255, 255, 0.35) 100%
                ) border-box;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            color: rgba(245, 245, 250, 0.95);
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, transform 0.1s ease, filter 0.2s ease;
        }

        .social-btn:hover {
            color: #fff;
            transform: translateY(-1px);
            filter: brightness(1.15);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        /* 新增：侧边栏抽屉容器 */
        #audioWrapper {
            position: absolute;
            left: 0;
            bottom: 40px;
            /* 利用 transform 把自身宽度隐藏到屏幕左侧，只留下 28px 的小把手 */
            transform: translateX(calc(-100% + 28px));
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);

        /* 鼠标悬浮时，抽屉完全滑出 */

        /* 抽屉弹出的小把手 */

        /* 录音状态下的把手样式 */

            color: #ff0055;

        /* 修改原本的音频面板：移除绝对定位，适应 Flex 布局 */
        #audioPanel {
            display: flex;

            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 102, 255, 0.1);
            backdrop-filter: blur(12px);

        #micToggle {

        #visualizer {

        .bar-fill {

            transition: height 0.05s linear; /* 略微平滑以防闪烁 */
        }

        #bar-bass { background: linear-gradient(to top, #ff0055, #ffaa00); }
        #bar-mid { background: linear-gradient(to top, #00ffaa, #00aaff); }
        #bar-treble { background: linear-gradient(to top, #0055ff, #aa00ff); }
        /* 新增：代表动画引擎转速的特殊颜色 (白/黄渐变) */
        #bar-speed { background: linear-gradient(to top, #ffffff, #ffee00); }

        .bar-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
        }

<body>
    <div id="loading">INITIALIZING 3D ENGINE...</div>
    <div id="socialBar">

            class="social-btn"

            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
        >
            <!-- 简化版 Instagram 圆角方框图标 -->

    <script>
        window.onload = function() {
            // Remove loading text
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 500);

            // 1. Scene Setup
            const scene = new THREE.Scene();
            // 移除纯色背景和雾效，以便显示CSS的渐变背景

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            // 初始相机位置（无 preset 时使用；有 preset 时在下方被覆盖）
            camera.position.set(0, 0, 15);
            camera.lookAt(0, 0, 0);

            // 移除 alpha: true，不再依赖 CSS 透明画布，解决后期辉光导致的黑屏问题
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for high-DPI
            
            // Enable physical accurate lighting and tone mapping for HDRI
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4; // 默认曝光与控制面板一致
            
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.autoRotateSpeed = 1.5;
            controls.enablePan = true;

            // 桌面：默认禁用相机，按 G 进入编辑模式才开启；移动端：始终允许手指触摸旋转/缩放
            const isMobile = 'ontouchstart' in window || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            let editMode = false;
            controls.enabled = isMobile;

            // 2. Cinematic Lighting (Simulating high-contrast environment)
            const ambientLight = new THREE.AmbientLight(0x051022, 1.5); // 深蓝色环境光
            scene.add(ambientLight);

            // 主光源：偏冷的亮白色
            const mainLight = new THREE.DirectionalLight(0xeef4ff, 1.5); 
            mainLight.position.set(2, 5, 5);
            scene.add(mainLight);

            // 暖色高光：还原参考图中的橘金色反光 (非常关键)
            const warmLight = new THREE.DirectionalLight(0xff7722, 3.5); 
            warmLight.position.set(5, -2, 3);
            scene.add(warmLight);

            // 强烈的青蓝色补光：还原左下角的明亮蓝色调
            const cyanLight = new THREE.PointLight(0x00aaff, 4.0, 50); 
            cyanLight.position.set(-4, -4, 2);
            scene.add(cyanLight);
            
            // 顶部深蓝光补光
            const blueLight = new THREE.PointLight(0x1133ff, 3.0, 50); 
            blueLight.position.set(0, 5, -5);
            scene.add(blueLight);

            // --- HDRI / Global Illumination Setup ---
            const textureLoader = new THREE.TextureLoader();
            // Note: If running on a local server, change this to your 'image_3eeffa.jpg' path!
            const hdriUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/2294472375_24a3b8ef46_o.jpg'; 
            
            textureLoader.load(hdriUrl, function(texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                texture.encoding = THREE.sRGBEncoding;
                
                // 仅应用为全局光照（反射和环境光），不再设为背景
                scene.environment = texture;
            });

            // --- 移除空间漂浮的烟尘粒子 ---

            // --- 设置辉光后期处理 (Glow/Bloom Post-Processing) ---
            const renderScene = new THREE.RenderPass(scene, camera);
            
            // 参数更新：分辨率, 发光强度 1.5, 辉光半径 0.8, 阈值 0.2
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.8, 0.2);
            
            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // --- 新增：彩虹色散特效 (Chromatic Aberration) ---
            const rgbShiftPass = new THREE.ShaderPass(THREE.RGBShiftShader);
            rgbShiftPass.uniforms['amount'].value = 0.0; // 根据截图归零
            rgbShiftPass.uniforms['angle'].value = Math.PI * 0.25; // 色散角度
            composer.addPass(rgbShiftPass);

            // --- 新增：赛博朋克扫描线特效 (Scanlines) ---
            const filmPass = new THREE.FilmPass(0.0, 0.5, 800, false); // 根据截图更新线强度为 0.5
            // noiseIntensity, scanlinesIntensity, scanlinesCount, grayscale
            composer.addPass(filmPass);

            // --- 新增：镜头暗角特效 (Vignette) ---
            const vignettePass = new THREE.ShaderPass(THREE.VignetteShader);
            vignettePass.uniforms['offset'].value = 1.0;
            vignettePass.uniforms['darkness'].value = 2.0; // 根据截图更新为 2.0
            composer.addPass(vignettePass);

            // 3. Object & Material (Chrome-plated liquid metal)
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x2f2c2c,
                metalness: 0.9,
                roughness: 0.0,
                clearcoat: 1.0,
                clearcoatRoughness: 0.258,
                envMapIntensity: 4.2,
                side: THREE.DoubleSide
            });

            // 占位球体：在真实模型加载完成前先渲染一个高质量球，让用户更快看到画面
            const placeholderGeometry = new THREE.SphereGeometry(2.0, 128, 128);
            const placeholderMesh = new THREE.Mesh(placeholderGeometry, material);
            scene.add(placeholderMesh);

            // 使用 OBJLoader 异步加载本地 ball.obj 替换原有球体
            let geometry = null;
            let mesh = null;
            let basePositions = null;
            let vertexCount = 0;

            const objLoader = new THREE.OBJLoader();
            objLoader.load(
                'ball.obj',
                function (obj) {
                    let foundMesh = false;
                    obj.traverse(child => {
                        if (foundMesh) return;
                        if (child.isMesh && child.geometry && child.geometry.attributes && child.geometry.attributes.position) {
                            foundMesh = true;
                            geometry = child.geometry;

                            // 将几何体居中并基于包围球半径进行缩放
                            geometry.computeBoundingSphere();
                            const radius = geometry.boundingSphere ? geometry.boundingSphere.radius : 1;
                            geometry.center();

                            const targetRadius = 2.0; // 与原始场景视觉大小相近
                            const scaleFactor = targetRadius / (radius || 1);

                            mesh = new THREE.Mesh(geometry, material);
                            mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);
                            scene.add(mesh);

                            // 模型准备好后移除占位球体
                            if (placeholderMesh) {
                                scene.remove(placeholderMesh);
                                placeholderGeometry.dispose();
                            }

                            const positionAttr = geometry.attributes.position;
                            basePositions = new Float32Array(positionAttr.array.length);
                            basePositions.set(positionAttr.array);
                            vertexCount = positionAttr.count;
                        }
                    });

                    if (!foundMesh) {
                        console.error('OBJ file loaded, but no mesh with position attribute was found.');
                    }
                },
                undefined,
                function (err) {
                    console.error('Failed to load ball.obj:', err);
                }
            );

            // 4. GUI Controls - 仅保留背景、材质、环境光与后期特效，不再控制模型外形
            const params = {
                exposure: 1.4,
                envIntensity: 4.2,
                bloomStrength: 1.5,
                bloomRadius: 0.46,
                bloomThreshold: 0.15,
                rgbShiftAmt: 0.0,
                scanlines: 0.5,
                vignetteDarkness: 2.0
            };

            const bgParams = {
                type: 'Gradient',
                color1: '#384fff',
                colorMid: '#5d657a',
                color2: '#000000',
                noise: 0.055
            };

            // 鼠标旋转控制参数
            const interactionParams = {
                rotationSensitivity: 0.6,
                verticalSensitivity: 0.6
            };

            // 启动时尝试从 localStorage 读取上次保存的预设
            try {
                const stored = localStorage.getItem('liquidMetalPreset');
                if (stored) {
                    const preset = JSON.parse(stored);
                    if (preset.params) Object.assign(params, preset.params);
                    if (preset.bgParams) Object.assign(bgParams, preset.bgParams);
                    if (preset.interactionParams) Object.assign(interactionParams, preset.interactionParams);
                    if (preset.camera) {
                        if (Array.isArray(preset.camera.position)) {
                            camera.position.fromArray(preset.camera.position);
                        }
                        if (Array.isArray(preset.camera.target)) {
                            controls.target.fromArray(preset.camera.target);
                            controls.update();
                        }
                    }
                    renderer.toneMappingExposure = params.exposure;
                    material.envMapIntensity = params.envIntensity;
                }
            } catch (e) {
                console.warn('Failed to load preset from localStorage', e);
            }

            // 暴露到 window，方便在 DevTools 中调试
            window.params = params;
            window.bgParams = bgParams;

            const gui = new dat.GUI({ width: 320 });
            gui.close();
            gui.domElement.style.display = 'none'; // 默认隐藏控制面板，按 G 键呼出

            // --- 新增：背景与噪点控制面板 ---
            const bgFolder = gui.addFolder('Background (背景 & 噪点)');
            
            function updateBackground() {
                // 使用 Canvas 动态绘制背景贴图，并作为 3D 场景的背景
                // 彻底解决 EffectComposer 后期处理导致的透明度丢失问题
                const size = 512;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                if (bgParams.type === 'Solid') {
                    ctx.fillStyle = bgParams.color2;
                    ctx.fillRect(0, 0, size, size);
                } else {
                    // 在画布左下角绘制径向渐变
                    const gradient = ctx.createRadialGradient(0, size, 0, 0, size, size * 1.5);
                    gradient.addColorStop(0, bgParams.color1);
                    gradient.addColorStop(0.5, bgParams.colorMid);
                    gradient.addColorStop(1, bgParams.color2);
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, size, size);
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.encoding = THREE.sRGBEncoding; // 匹配渲染器的色彩空间
                
                // 清理旧背景并应用新背景
                if (scene.background && scene.background.dispose) {
                    scene.background.dispose();
                }
                scene.background = texture;
            }
            
            bgFolder.add(bgParams, 'type', ['Solid', 'Gradient']).name('Bg Type (类型)').onChange(updateBackground);
            bgFolder.addColor(bgParams, 'color1').name('Grad Start (渐变起)').onChange(updateBackground);
            bgFolder.addColor(bgParams, 'colorMid').name('Grad Mid (渐变中)').onChange(updateBackground);
            bgFolder.addColor(bgParams, 'color2').name('Base/End (纯色/尾)').onChange(updateBackground);
            bgFolder.add(bgParams, 'noise', 0.0, 0.5).name('Film Grain (颗粒强度)').onChange(v => {
                document.body.style.setProperty('--noise-opacity', v);
            });
            // bgFolder.open(); // 默认收起背景以节省空间
            
            // 初始化背景和胶片颗粒强度
            updateBackground();
            document.body.style.setProperty('--noise-opacity', bgParams.noise);
            
            // 新增：材质控制面板
            const matParams = { color: material.color.getHex() };
            const matFolder = gui.addFolder('Material (材质控制)');
            matFolder.addColor(matParams, 'color').name('Base Color').onChange(v => material.color.setHex(v));
            matFolder.add(material, 'metalness', 0.0, 1.0).name('Metalness (金属度)');
            matFolder.add(material, 'roughness', 0.0, 1.0).name('Roughness (粗糙度)');
            matFolder.add(material, 'clearcoat', 0.0, 1.0).name('Clearcoat (清漆层)');
            matFolder.add(material, 'clearcoatRoughness', 0.0, 1.0).name('CC Roughness');
            matFolder.open();

            const lightFolder = gui.addFolder('Environment (环境)');
            lightFolder.add(params, 'exposure', 0.1, 3.0).name('Exposure').onChange(v => renderer.toneMappingExposure = v);
            lightFolder.add(params, 'envIntensity', 0.0, 5.0).name('HDRI Intensity').onChange(v => material.envMapIntensity = v);
            lightFolder.open();

            const postFolder = gui.addFolder('Post-Processing (后期辉光 & 特效)');
            postFolder.add(params, 'bloomStrength', 0.0, 3.0).name('Glow Strength').onChange(v => bloomPass.strength = v);
            postFolder.add(params, 'bloomRadius', 0.0, 2.0).name('Glow Radius').onChange(v => bloomPass.radius = v);
            postFolder.add(params, 'bloomThreshold', 0.0, 1.0).name('Glow Threshold').onChange(v => bloomPass.threshold = v);
            
            // 新增特效的控制项
            postFolder.add(params, 'rgbShiftAmt', 0.0, 0.02).name('RGB Aberration (彩虹...)').onChange(v => rgbShiftPass.uniforms['amount'].value = v);
            postFolder.add(params, 'scanlines', 0.0, 1.0).name('Scanlines (扫描线)').onChange(v => filmPass.uniforms['sIntensity'].value = v);
            postFolder.add(params, 'vignetteDarkness', 0.0, 3.0).name('Vignette (镜头暗角)').onChange(v => vignettePass.uniforms['darkness'].value = v);
            postFolder.open();

            // --- 新增：保存 / 读取按钮，保存当前参数与相机初始位置 ---
            const presetHelper = {
                savePreset() {
                    const preset = {
                        params: { ...params },
                        bgParams: { ...bgParams },
                        interactionParams: { ...interactionParams },
                        camera: {
                            position: camera.position.toArray(),
                            target: controls.target.toArray()
                        }
                    };
                    try {
                        localStorage.setItem('liquidMetalPreset', JSON.stringify(preset));
                        console.log('Preset saved:', preset);
                    } catch (e) {
                        console.warn('Failed to save preset to localStorage', e);
                    }
                },
                loadPreset() {
                    try {
                        const stored = localStorage.getItem('liquidMetalPreset');
                        if (!stored) return;
                        const preset = JSON.parse(stored);
                        if (preset.params) Object.assign(params, preset.params);
                        if (preset.bgParams) Object.assign(bgParams, preset.bgParams);
                        if (preset.interactionParams) Object.assign(interactionParams, preset.interactionParams);
                        if (preset.camera) {
                            if (Array.isArray(preset.camera.position)) {
                                camera.position.fromArray(preset.camera.position);
                            }
                            if (Array.isArray(preset.camera.target)) {
                                controls.target.fromArray(preset.camera.target);
                                controls.update();
                            }
                        }
                        // 应用到渲染与背景
                        renderer.toneMappingExposure = params.exposure;
                        material.envMapIntensity = params.envIntensity;
                        updateBackground();
                        document.body.style.setProperty('--noise-opacity', bgParams.noise);
                        console.log('Preset loaded:', preset);
                    } catch (e) {
                        console.warn('Failed to load preset from localStorage', e);
                    }
                }
            };
            const sessionFolder = gui.addFolder('Session (会话)');
            sessionFolder.add(presetHelper, 'savePreset').name('Save Preset');
            sessionFolder.add(presetHelper, 'loadPreset').name('Load Preset');

            // --- 新增：鼠标控制参数与状态 ---
            window.interactionParams = interactionParams;
            const mouseFolder = gui.addFolder('Mouse Control (鼠标控制)');
            mouseFolder.add(interactionParams, 'rotationSensitivity', 0.0, 3.0).name('Rotate Sensitivity');
            mouseFolder.add(interactionParams, 'verticalSensitivity', 0.0, 3.0).name('Tilt Sensitivity');
            mouseFolder.open();

            const mouseState = { x: 0, targetX: 0, y: 0, targetY: 0 };
            window.addEventListener('mousemove', (event) => {
                const normalizedX = (event.clientX / window.innerWidth) * 2 - 1; // -1 ~ 1
                mouseState.targetX = normalizedX;
                const normalizedY = (event.clientY / window.innerHeight) * 2 - 1; // -1 ~ 1
                mouseState.targetY = normalizedY;
            });

            // 使用快捷键切换控制面板显示状态与相机编辑模式（按 G 键）；移动端仅切换面板，相机始终可触摸操作
            window.addEventListener('keydown', (event) => {
                if (event.key === 'g' || event.key === 'G') {
                    const isHidden = gui.domElement.style.display === 'none';
                    const willShow = isHidden;
                    gui.domElement.style.display = willShow ? '' : 'none';

                    if (!isMobile) {
                        editMode = willShow;
                        controls.enabled = editMode;
                    }
                }
            });

            // 5. Animation Loop
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                // 如果模型尚未加载完成，仅更新控制器与后期处理渲染
                if (!geometry || !basePositions || !geometry.attributes || !geometry.attributes.position) {
                    controls.update();
                    composer.render();
                    return;
                }

                // 固定时间轴，仅用于灯光和特效的缓慢变化（不再驱动模型外形）
                const time = clock.getElapsedTime();

                // 根据鼠标左右/上下移动，微微旋转模型
                mouseState.x += (mouseState.targetX - mouseState.x) * 0.1; // 平滑插值
                mouseState.y += (mouseState.targetY - mouseState.y) * 0.1;
                if (mesh) {
                    mesh.rotation.y = mouseState.x * interactionParams.rotationSensitivity;
                    mesh.rotation.x = mouseState.y * interactionParams.verticalSensitivity;
                }

                // 让橘色暖光稍微游动，增加空间层次感（不改变模型形状）
                warmLight.position.x = 5 + Math.sin(time * 0.5);
                warmLight.position.y = -2 + Math.cos(time * 0.3);

                // 让彩虹色散的角度跟随时间缓慢旋转
                rgbShiftPass.uniforms['angle'].value = time * 0.5;

                controls.update();
                // 使用 composer 渲染带有辉光的场景
                composer.render();
            }

            // Handle window resizing
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            }

            // Start animation
            animate();
        };
    </script>
</body>
</html>
